<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Heuristics Evaluator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 16px; padding: 48px; width: 100%; max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center; }
  h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; color: #1a1a2e; }
  .subtitle { color: #6b7280; font-size: .95rem; margin-bottom: 36px; }
  .drop-zone { border: 2px dashed #c8d0de; border-radius: 12px; padding: 40px 20px; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4f46e5; background: #f5f3ff; }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .drop-label { font-size: 1rem; color: #374151; font-weight: 500; }
  .drop-sub { font-size: .82rem; color: #9ca3af; margin-top: 4px; }
  #filename { margin-top: 12px; font-size: .88rem; color: #4f46e5; font-weight: 500; min-height: 1.2em; }
  .btn { display: block; width: 100%; margin-top: 24px; padding: 14px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn:hover { background: #4338ca; }
  .btn:disabled { background: #c4b5fd; cursor: not-allowed; }
  .spinner { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; color: #6b7280; font-size: .9rem; }
  .spinner.show { display: flex; }
  .spin { width: 18px; height: 18px; border: 2px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .badge { background: #f3f4f6; border-radius: 20px; padding: 4px 12px; font-size: .78rem; color: #374151; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:2rem;margin-bottom:10px">🔍</div>
  <h1>UX Heuristics Evaluator</h1>
  <p class="subtitle">Upload a web screenshot — get instant Nielsen heuristics analysis</p>
  <div class="badges">
    <span class="badge">10 Nielsen Heuristics</span>
    <span class="badge">AI Scoring</span>
    <span class="badge">Element Detection</span>
  </div>
  <form method="POST" action="/evaluate" enctype="multipart/form-data" id="form">
    <div class="drop-zone" id="dropZone">
      <input type="file" name="screenshot" accept="image/*" id="fileInput" required>
      <div class="drop-icon">📸</div>
      <div class="drop-label">Drop screenshot here or click to browse</div>
      <div class="drop-sub">PNG, JPG, WEBP supported</div>
    </div>
    <div id="filename"></div>
    <button class="btn" type="submit" id="submitBtn">Evaluate Screenshot</button>
    <div class="spinner" id="spinner">
      <div class="spin"></div>
      <span>Running UIClip analysis… this may take 20–40 seconds</span>
    </div>
  </form>
</div>
<script>
  const fi = document.getElementById('fileInput');
  const dz = document.getElementById('dropZone');
  const fn = document.getElementById('filename');
  const btn = document.getElementById('submitBtn');
  const sp = document.getElementById('spinner');
  fi.addEventListener('change', () => { fn.textContent = fi.files[0]?.name || ''; });
  ['dragover','dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.toggle('drag-over', ev === 'dragover'); }));
  document.getElementById('form').addEventListener('submit', () => { btn.disabled = true; sp.classList.add('show'); });
</script>
</body>
</html>
